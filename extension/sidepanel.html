<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adframe Clipper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 16px; color: #111; background: #fff; }
    h1 { font-size: 18px; margin-bottom: 16px; }
    .login-view, .form-view, .success-view { display: none; }
    .login-view.active, .form-view.active, .success-view.active { display: block; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; margin-top: 12px; }
    input, textarea { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    textarea { resize: vertical; min-height: 120px; }
    .btn { display: block; width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; margin-top: 16px; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
    .btn-google { background: #fff; color: #333; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-google:hover { background: #f5f5f5; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; background: #f3f4f6; border-radius: 4px; font-size: 12px; }
    .tag button { background: none; border: none; cursor: pointer; color: #999; font-size: 14px; }
    .tag-input-row { display: flex; gap: 6px; }
    .tag-input-row input { flex: 1; }
    .tag-input-row button { padding: 6px 12px; background: #f3f4f6; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .success-view { text-align: center; padding-top: 40px; }
    .success-view .icon { font-size: 48px; margin-bottom: 12px; }
    .error { color: #dc2626; font-size: 13px; margin-top: 8px; }
    .user-info { font-size: 13px; color: #666; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
    .user-info button { background: none; border: none; color: #2563eb; cursor: pointer; font-size: 12px; }
  </style>
</head>
<body>
  <h1>Adframe Clipper</h1>

  <div id="loginView" class="login-view active">
    <p style="font-size: 14px; color: #666; margin-bottom: 16px;">Sign in to send articles to your Inbox.</p>
    <button id="googleLoginBtn" class="btn btn-google">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Login with Google
    </button>
  </div>

  <div id="formView" class="form-view">
    <div id="userInfo" class="user-info">
      <span id="userEmail"></span>
      <button id="logoutBtn">Logout</button>
    </div>
    <div id="extractError" class="error" style="display:none;"></div>
    <label>Title</label>
    <input type="text" id="titleInput">
    <label>Source URL</label>
    <input type="text" id="urlInput" readonly>
    <label>Content</label>
    <textarea id="contentInput"></textarea>
    <label>Tags</label>
    <div class="tags" id="tagsContainer"></div>
    <div class="tag-input-row" style="margin-top: 6px;">
      <input type="text" id="tagInput" placeholder="Type a tag and press Enter">
      <button id="addTagBtn">Add</button>
    </div>
    <div id="formError" class="error" style="display:none;"></div>
    <button id="submitBtn" class="btn btn-primary">Send to Inbox</button>
  </div>

  <div id="successView" class="success-view">
    <div class="icon">✅</div>
    <p style="font-size: 16px; font-weight: 600;">Sent to Inbox!</p>
    <button id="clipAnotherBtn" class="btn btn-primary" style="margin-top: 24px;">Clip Next Article</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
